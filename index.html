<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Game for Kids</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4A90E2">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>

    <!-- Schermata Iniziale -->
    <div id="overlay">
        <h1 class="overlay-title">Ready? 🌈</h1>

        <div id="settings">
            <h2 class="settings-title">Choose Categories</h2>
            <div id="categories-list"></div>
        </div>

        <button id="play-button" onclick="startGame()">▶️ PLAY</button>
        <p class="overlay-hint">Tocca per attivare l'audio!</p>
    </div>

    <!-- Gioco -->
    <div id="feedback"></div>
    <button id="repeat-btn" onclick="repeatWord()">👂 Listen Again</button>

    <div id="game-container">
        <div class="choices-grid">
            <button class="choice-btn" id="c0" onclick="check(0)"></button>
            <button class="choice-btn" id="c1" onclick="check(1)"></button>
            <button class="choice-btn" id="c2" onclick="check(2)"></button>
            <button class="choice-btn" id="c3" onclick="check(3)"></button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
